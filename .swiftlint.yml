# SwiftLint configuration for ClipboardManager
# Install: brew install swiftlint
# Run: swiftlint (from repo root)

included:
  - ClipboardManager/Sources
  - ClipboardManager/Tests

excluded:
  - ClipboardManager/.build

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 700

function_body_length:
  warning: 50
  error: 80

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_count
  - empty_string
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
